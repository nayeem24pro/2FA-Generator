<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2FA TOTP Generator</title>
<style>
    body { 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; 
        max-width: 400px; 
        margin: 50px auto; 
        padding: 20px; 
        background: #f0f2f5;
    }
    .card {
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 { margin-top: 0; color: #1877f2; }
    input { 
        width: 100%; 
        padding: 12px; 
        margin: 8px 0 16px; 
        border: 1px solid #ddd; 
        border-radius: 6px; 
        font-size: 16px;
        box-sizing: border-box;
    }
    .code { 
        font-size: 36px; 
        font-weight: bold; 
        letter-spacing: 8px; 
        text-align: center; 
        margin: 20px 0; 
        color: #1c1e21;
        font-family: 'Courier New', monospace;
    }
    .timer { 
        height: 4px; 
        background: #e4e6eb; 
        border-radius: 2px; 
        overflow: hidden; 
        margin-bottom: 8px;
    }
    .timer-bar { 
        height: 100%; 
        background: #1877f2; 
        transition: width 1s linear; 
    }
    .time-text { 
        text-align: center; 
        color: #65676b; 
        font-size: 14px; 
    }
    .warning {
        background: #fff4e5;
        border-left: 4px solid #ff9800;
        padding: 12px;
        margin-top: 20px;
        font-size: 13px;
        border-radius: 4px;
    }
</style>
</head>
<body>
<div class="card">
    <h2>FB/IG 2FA Code</h2>
    <label>Enter your 2FA Secret Key:</label>
    <input type="text" id="secret" placeholder="JBSWY3DPEHPK3PXP" autocomplete="off">
    
    <div class="code" id="code">------</div>
    <div class="timer"><div class="timer-bar" id="timerBar"></div></div>
    <div class="time-text" id="timeText">Enter secret to generate code</div>
    
    <div class="warning">
        <b>Security note:</b> Only use this on your own device. Never enter your secret on sites you don't trust. 
        FB/IG will never ask for your secret key.
    </div>
</div>

<script>
// Base32 decode + TOTP implementation
function base32Decode(base32) {
    const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
    let bits = '';
    let bytes = [];
    
    base32 = base32.replace(/=+$/, '').toUpperCase().replace(/[^A-Z2-7]/g, '');
    
    for (let i = 0; i < base32.length; i++) {
        const val = alphabet.indexOf(base32.charAt(i));
        if (val === -1) continue;
        bits += val.toString(2).padStart(5, '0');
    }
    
    for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.substring(i, i + 8), 2));
    }
    return new Uint8Array(bytes);
}

async function hmacSha1(key, message) {
    const cryptoKey = await crypto.subtle.importKey(
        'raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']
    );
    const signature = await crypto.subtle.sign('HMAC', cryptoKey, message);
    return new Uint8Array(signature);
}

async function generateTOTP(secret) {
    try {
        const key = base32Decode(secret);
        const epoch = Math.floor(Date.now() / 1000);
        const time = Math.floor(epoch / 30);
        const timeBuffer = new ArrayBuffer(8);
        const timeView = new DataView(timeBuffer);
        timeView.setUint32(4, time, false);
        
        const hmac = await hmacSha1(key, timeBuffer);
        const offset = hmac[hmac.length - 1] & 0xf;
        const code = ((hmac[offset] & 0x7f) << 24) |
                     ((hmac[offset + 1] & 0xff) << 16) |
                     ((hmac[offset + 2] & 0xff) << 8) |
                     (hmac[offset + 3] & 0xff);
        
        return (code % 1000000).toString().padStart(6, '0');
    } catch (e) {
        return 'Error';
    }
}

async function update() {
    const secret = document.getElementById('secret').value.trim();
    const codeEl = document.getElementById('code');
    const timeText = document.getElementById('timeText');
    const timerBar = document.getElementById('timerBar');
    
    if (!secret) {
        codeEl.textContent = '------';
        timeText.textContent = 'Enter secret to generate code';
        timerBar.style.width = '0%';
        return;
    }
    
    const code = await generateTOTP(secret);
    codeEl.textContent = code;
    
    const epoch = Math.floor(Date.now() / 1000);
    const seconds = 30 - (epoch % 30);
    timeText.textContent = `Refreshes in ${seconds}s`;
    timerBar.style.width = (seconds / 30 * 100) + '%';
}

setInterval(update, 1000);
document.getElementById('secret').addEventListener('input', update);
update();
</script>
</body>
</html>
